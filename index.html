<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login & Configuração de Conta</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@font-face {
  font-family: 'Tungsten Bold';
  src: url('Tungsten-Bold.ttf') format('truetype');
  font-weight: bold;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111 url('IMG_2294.jpeg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  overflow-y: auto;
}

.container {
  background: rgba(0, 0, 0, 0.85);
  border-radius: 16px;
  padding: 25px;
  width: 100%;
  max-width: 450px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  position: relative;
  backdrop-filter: blur(10px);
  margin-top: 20px;
  margin-bottom: 50px;
}

h1 { 
    color: #ff8800; 
    font-family: 'Tungsten Bold', Arial, sans-serif; 
    text-align: center; 
    margin: 0 0 20px 0;
    text-transform: uppercase;
    font-size: 2em;
}

input, button {
  width: 100%; 
  padding: 14px; 
  margin-bottom: 12px; 
  border-radius: 10px; 
  border: 1px solid #444;
  background: #222; 
  color: #fff; 
  font-size: 16px; 
  box-sizing: border-box;
}

button { 
    background: #ff8800; 
    color: #111; 
    font-weight: bold; 
    cursor: pointer; 
    border: none;
    text-transform: uppercase;
}

.hidden { display: none !important; }

/* FIX DEFINITIVO DO SCROLL DO AVATAR */
.avatar-row, .achievements-row { 
    display: flex; 
    flex-wrap: nowrap; /* Impede quebrar linha */
    overflow-x: auto; /* Habilita scroll horizontal */
    overflow-y: hidden;
    gap: 15px; 
    width: 100%; 
    padding: 15px; 
    border: 1px solid #444; 
    border-radius: 12px; 
    margin-bottom: 20px; 
    background: rgba(0, 0, 0, 0.3);
    box-sizing: border-box;
    -webkit-overflow-scrolling: touch; /* Scroll suave mobile */
}

/* Esconde a barra de scroll feia em alguns navegadores mas mantém a função */
.avatar-row::-webkit-scrollbar, .achievements-row::-webkit-scrollbar {
    height: 6px;
}
.avatar-row::-webkit-scrollbar-thumb, .achievements-row::-webkit-scrollbar-thumb {
    background: #ff8800;
    border-radius: 10px;
}

.avatar-row img { 
    width: 100px; 
    height: 100px; 
    border-radius: 12px; 
    object-fit: cover; 
    flex-shrink: 0; /* CRUCIAL: Impede a imagem de amassar */
    border: 3px solid transparent; 
    transition: 0.2s;
    cursor: pointer;
}

.avatar-row img.selected { 
    border-color: #ff8800; 
    transform: scale(1.05);
}

.achievement { 
    flex-shrink: 0; /* Impede de amassar */
    width: 110px;
    display: flex; 
    flex-direction: column;
    align-items: center; 
    text-align: center;
    opacity: 0.3;
}
.achievement i { font-size: 28px; margin-bottom: 8px; }
.achievement.unlocked { opacity: 1; color: #ffee00; }

#gearBtn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 22px; color: #ff8800; z-index: 10; }

.xp-display { 
    text-align: center;
    font-size: 24px; 
    font-weight: bold; 
    color: #ffee00; 
    font-family: 'Tungsten Bold', sans-serif;
    margin-bottom: 15px;
}

hr { width: 100%; border: 0; border-top: 1px solid #333; margin: 20px 0; }
</style>
</head>
<body>

<div class="container">
  <div id="gearBtn" class="hidden"><i class="fas fa-cog"></i></div>

  <div id="loginBox">
    <h1>ENTRAR</h1>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <button id="loginBtn">Entrar / Criar Conta</button>
  </div>

  <div id="mainBox" class="hidden">
    <div class="xp-display" id="xpDisplay">XP: 0</div>
    
    <h1>SEU AVATAR</h1>
    <div class="avatar-row" id="avatarRow"></div>
    <button id="saveAvatarBtn">Salvar e Continuar</button>

    <hr>

    <h1>CONQUISTAS</h1>
    <div class="achievements-row" id="achievementsRow"></div>
  </div>

  <div id="configBox" class="hidden">
    <h1>AJUSTES</h1>
    <input type="text" id="newName" placeholder="Mudar nome">
    <button id="changeNameBtn">Mudar Nome</button>
    <button id="logoutBtn" style="background: #444; color: #fff;">Sair da Conta</button>
    <button id="closeConfigBtn" style="background: transparent; border: 1px solid #555; color: #fff; margin-top: 10px;">Voltar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCA2XWZzavTNdHi_w8X5aASfBTfoLVsghY",
  authDomain: "auto-dance.firebaseapp.com",
  databaseURL: "https://auto-dance-default-rtdb.firebaseio.com",
  projectId: "auto-dance",
  storageBucket: "auto-dance.firebasestorage.app",
  messagingSenderId: "960760470726",
  appId: "1:960760470726:web:f5af55d01df6a2be0d4bc7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const loginBox = document.getElementById('loginBox');
const mainBox = document.getElementById('mainBox');
const configBox = document.getElementById('configBox');
const gearBtn = document.getElementById('gearBtn');
const avatarRow = document.getElementById('avatarRow');
const achievementsRow = document.getElementById('achievementsRow');

let currentUser = null;
let selectedAvatarUrl = null;

const achievementsList = [
  {id: "first_login", name: "Primeiro Login", xp: 50},
  {id: "avatar_set", name: "Estiloso", xp: 100}
];

// LOGIN / CADASTRO
document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value.trim();
  if(!email || !senha) return alert("Preencha tudo!");
  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch (e) {
    if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
        try {
          await createUserWithEmailAndPassword(auth, email, senha);
        } catch (err) { alert("Erro ao criar conta: " + err.message); }
    } else { alert("Erro: " + e.message); }
  }
};

onAuthStateChanged(auth, user => {
  if(user) {
    currentUser = user;
    loginBox.classList.add('hidden');
    mainBox.classList.remove('hidden');
    gearBtn.classList.remove('hidden');
    loadUserData();
    loadAvatars();
  } else {
    currentUser = null;
    loginBox.classList.remove('hidden');
    mainBox.classList.add('hidden');
    gearBtn.classList.add('hidden');
    configBox.classList.add('hidden');
  }
});

// CARREGAR DADOS SEM SOBRESCREVER (FIX DO XP)
function loadUserData() {
  const userRef = ref(db, `users/${currentUser.uid}`);
  
  onValue(userRef, (snap) => {
    const data = snap.val() || {};
    
    // 1. Atualiza o XP na tela
    document.getElementById('xpDisplay').textContent = `XP: ${data.xp || 0}`;
    
    // 2. Renderiza Conquistas
    achievementsRow.innerHTML = "";
    achievementsList.forEach(ach => {
      const isUnlocked = data.achievements && data.achievements[ach.id];
      achievementsRow.innerHTML += `
        <div class="achievement ${isUnlocked ? 'unlocked' : ''}">
          <i class="fas fa-trophy"></i>
          <span>${ach.name}<br>+${ach.xp}XP</span>
        </div>
      `;
    });

    // 3. Só desbloqueia "Primeiro Login" se for REALMENTE a primeira vez
    if(!data.achievements?.first_login) {
        unlockAchievement('first_login', 50);
    }
  });
}

// FUNÇÃO DE DESBLOQUEIO SEGURA
async function unlockAchievement(id, xpAmount) {
  const userRef = ref(db, `users/${currentUser.uid}`);
  const snap = await get(userRef);
  const data = snap.val() || { xp: 0, achievements: {} };
  
  // Verifica novamente dentro da transação se já existe para não duplicar XP
  if(!data.achievements?.[id]) {
    await update(userRef, {
      [`achievements/${id}`]: true,
      xp: (data.xp || 0) + xpAmount
    });
  }
}

async function loadAvatars() {
  avatarRow.innerHTML = "Carregando...";
  try {
    const res = await fetch("https://api.github.com/repos/raphamodelagem3d-lab/Login/contents/Just%20dance%20avatars");
    const files = await res.json();
    avatarRow.innerHTML = "";
    files.forEach(file => {
      if(file.name.match(/\.(png|jpg|jpeg)$/i)) {
        const img = document.createElement('img');
        img.src = file.download_url;
        img.onclick = () => {
          document.querySelectorAll('.avatar-row img').forEach(i => i.classList.remove('selected'));
          img.classList.add('selected');
          selectedAvatarUrl = file.download_url;
        };
        avatarRow.appendChild(img);
      }
    });
  } catch(e) { avatarRow.innerHTML = "Erro ao carregar avatares."; }
}

document.getElementById('saveAvatarBtn').onclick = async () => {
  if(!selectedAvatarUrl) return alert("Escolha um avatar!");
  
  const userRef = ref(db, `users/${currentUser.uid}`);
  const snap = await get(userRef);
  const data = snap.val() || {};

  // Atualiza avatar
  await update(userRef, { avatar: selectedAvatarUrl });

  // Só dá XP de avatar se ele ainda não tiver essa conquista
  if(!data.achievements?.avatar_set) {
      await unlockAchievement('avatar_set', 100);
  }
  
  window.location.href = "https://raphamodelagem3d-lab.github.io/Auto-dance-Just-dance-/";
};

// CONTROLES DE INTERFACE
gearBtn.onclick = () => {
    mainBox.classList.add('hidden');
    configBox.classList.remove('hidden');
};
document.getElementById('closeConfigBtn').onclick = () => {
    configBox.classList.add('hidden');
    mainBox.classList.remove('hidden');
};
document.getElementById('logoutBtn').onclick = () => signOut(auth);
</script>
